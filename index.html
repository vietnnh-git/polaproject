<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pola Project - Sắp Ra Mắt</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300&family=Pacifico&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- SVG liquid distortion filter — applied to blobs for true liquid glass -->
  <svg style="position:absolute;width:0;height:0" aria-hidden="true">
    <defs>
      <filter id="liquid-distort" x="-20%" y="-20%" width="140%" height="140%">
        <feTurbulence type="fractalNoise" baseFrequency="0.012 0.008" numOctaves="4" seed="3" result="noise">
          <animate attributeName="baseFrequency"
            values="0.012 0.008;0.016 0.013;0.010 0.007;0.012 0.008"
            dur="10s" repeatCount="indefinite"/>
        </feTurbulence>
        <feDisplacementMap in="SourceGraphic" in2="noise" scale="28"
          xChannelSelector="R" yChannelSelector="G"/>
      </filter>
    </defs>
  </svg>

  <!-- Background blobs -->
  <div class="blob blob-peach"></div>
  <div class="blob blob-gold"></div>
  <div class="blob blob-lavender"></div>

  <!-- Polaris Star — corner decoration -->
  <div class="polaris" aria-hidden="true">
    <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="pg" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#fff" stop-opacity="1"/>
          <stop offset="60%" stop-color="#fbbf24" stop-opacity="0.8"/>
          <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
        </radialGradient>
      </defs>
      <!-- Main rays -->
      <ellipse cx="32" cy="32" rx="3.5" ry="28" fill="url(#pg)"/>
      <ellipse cx="32" cy="32" rx="28" ry="3.5" fill="url(#pg)"/>
      <!-- Diagonal rays (smaller) -->
      <ellipse cx="32" cy="32" rx="2" ry="16" fill="url(#pg)" opacity="0.5" transform="rotate(45 32 32)"/>
      <ellipse cx="32" cy="32" rx="2" ry="16" fill="url(#pg)" opacity="0.5" transform="rotate(-45 32 32)"/>
      <!-- Core -->
      <circle cx="32" cy="32" r="3.5" fill="white" opacity="0.95"/>
    </svg>
  </div>

  <!-- Main card -->
  <main class="card">

    <!-- Title -->
    <h1 class="title">
      <svg class="title-star" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <defs>
          <radialGradient id="ts" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#fff" stop-opacity="1"/>
            <stop offset="55%" stop-color="#fbbf24" stop-opacity="0.9"/>
            <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
          </radialGradient>
        </defs>
        <ellipse cx="12" cy="12" rx="1.4" ry="11" fill="url(#ts)"/>
        <ellipse cx="12" cy="12" rx="11" ry="1.4" fill="url(#ts)"/>
        <ellipse cx="12" cy="12" rx="0.8" ry="6" fill="url(#ts)" opacity="0.55" transform="rotate(45 12 12)"/>
        <ellipse cx="12" cy="12" rx="0.8" ry="6" fill="url(#ts)" opacity="0.55" transform="rotate(-45 12 12)"/>
        <circle cx="12" cy="12" r="1.5" fill="white" opacity="0.95"/>
      </svg>
      pola project
    </h1>
    <p class="subtitle">Đang chuẩn bị một cái gì đó tuyệt vời</p>

    <div class="divider"></div>

    <!-- Progress -->
    <div class="progress-header">
      <span class="progress-label">Tiến độ</span>
      <span class="progress-value">85%</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill"></div>
    </div>

    <div class="divider"></div>

    <!-- Email form -->
    <p class="form-hint">Nhận thông báo khi ra mắt</p>
    <form id="emailForm" class="form">
      <input type="email" class="email-input" placeholder="your@email.com" required>
      <button type="submit" class="cta-btn">
        <span class="btn-shimmer"></span>
        Nhận thông báo
      </button>
    </form>

    <div class="divider"></div>

    <!-- Music player -->
    <div class="player-pill">
      <div class="player-art">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.8)" stroke-width="1.8" stroke-linecap="round">
          <path d="M9 18V5l12-2v13"/>
          <circle cx="6" cy="18" r="3"/>
          <circle cx="18" cy="16" r="3"/>
        </svg>
      </div>
      <div class="player-info">
        <span class="player-tag">AVICII</span>
        <span class="player-title">The Night</span>
      </div>
      <button class="player-btn" id="playBtn" title="Play / Pause">
        <svg id="iconPlay" width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
          <polygon points="5,3 19,12 5,21"/>
        </svg>
        <svg id="iconPause" width="14" height="14" viewBox="0 0 24 24" fill="currentColor" style="display:none">
          <rect x="6" y="4" width="4" height="16" rx="1"/>
          <rect x="14" y="4" width="4" height="16" rx="1"/>
        </svg>
      </button>
    </div>
    <audio id="bgAudio" src="avicii-the-nights.mp3" loop></audio>

    <div class="divider"></div>

    <!-- Social icons -->
    <div class="social-row">
      <!-- Facebook -->
      <a href="https://www.facebook.com/vietnnh/" target="_blank" rel="noopener" class="social-btn" title="Facebook">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
          <path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/>
        </svg>
      </a>
      <!-- Instagram -->
      <a href="https://www.instagram.com/vietnnh/" target="_blank" rel="noopener" class="social-btn" title="Instagram">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
          <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
          <circle cx="12" cy="12" r="4"/>
          <circle cx="17.5" cy="6.5" r="0.6" fill="currentColor" stroke="none"/>
        </svg>
      </a>
      <!-- LinkedIn -->
      <a href="https://www.linkedin.com/in/nnhviet1401" target="_blank" rel="noopener" class="social-btn" title="LinkedIn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
          <path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/>
          <rect x="2" y="9" width="4" height="12"/>
          <circle cx="4" cy="4" r="2"/>
        </svg>
      </a>
    </div>

    <p class="copyright">© 2026 Pola Project. Tất cả quyền được bảo lưu.</p>
  </main>

  <script src="script.js"></script>
</body>
</html>
