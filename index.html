<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PolaProject - Sắp Ra Mắt</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="content">
            <div class="logo">🚀</div>
            <h1>PolaProject</h1>
            <p class="subtitle">Đang chuẩn bị một cái gì đó tuyệt vời</p>
            
            <div class="progress">
                <div class="progress-bar"></div>
            </div>
            <p class="progress-text">Tiến độ: 85%</p>
            
            <div class="cta-section">
                <p>Nhận thông báo khi ra mắt:</p>
                <form class="email-form" id="emailForm">
                    <input type="email" placeholder="Nhập email của bạn" required>
                    <button type="submit">Nhận thông báo</button>
                </form>
            </div>
            
            <div class="social">
                <a href="https://twitter.com" target="_blank">Twitter</a>
                <a href="https://instagram.com" target="_blank">Instagram</a>
                <a href="mailto:hello@polaproject.com">Email</a>
            </div>
            
            <p class="footer-text">© 2026 PolaProject. Tất cả quyền được bảo lưu.</p>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
